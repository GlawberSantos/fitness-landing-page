<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69B99D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ea788;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .pulse-animation {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Main Circle -->
  <circle cx="100" cy="100" r="75" fill="url(#logoGradient)"/>
  
  <!-- Dumbbell Left -->
  <g>
    <!-- Handle -->
    <rect x="45" y="85" width="40" height="30" rx="15" fill="white" opacity="0.9"/>
    <!-- Weight Left -->
    <circle cx="40" cy="100" r="12" fill="white" opacity="0.8"/>
    <!-- Weight Right -->
    <circle cx="90" cy="100" r="12" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Dumbbell Right (rotated) -->
  <g transform="translate(100, 100) rotate(45) translate(-100, -100)">
    <!-- Handle -->
    <rect x="115" y="85" width="40" height="30" rx="15" fill="white" opacity="0.9"/>
    <!-- Weight Left -->
    <rect x="110" y="88" width="18" height="24" rx="4" fill="white" opacity="0.8"/>
    <!-- Weight Right -->
    <rect x="152" y="88" width="18" height="24" rx="4" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Heart accent (subtle) -->
  <g transform="translate(100, 130)" class="pulse-animation">
    <path d="M 0,-8 C -5,-13 -12,-13 -12,-6 C -12,0 0,8 0,8 C 0,8 12,0 12,-6 C 12,-13 5,-13 0,-8 Z" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Text: TM (brand initials) -->
  <text x="100" y="65" font-family="Mulish, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">TM</text>
</svg>